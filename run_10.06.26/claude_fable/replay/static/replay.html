<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BotHack Replay</title>
<link rel="stylesheet" href="/static/xterm.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-replay">
<header>
  <a href="/" class="back">← all games</a>
  <h1 id="title">replay</h1>
  <span id="meta-bar" class="muted"></span>
</header>

<main>
  <div id="term-wrap">
    <div id="term"></div>
  </div>

  <section class="controls">
    <div class="row top-row">
      <div class="readout">
        <span class="big" id="readout-turn">T:?</span>
        <span class="readout-sub">frame <span id="readout-frame">0</span>/<span id="readout-frames">0</span></span>
        <span class="readout-sub">@ <span id="readout-time">0.0s</span></span>
      </div>
      <div class="speeds">
        speed:
        <button data-speed="0.25">¼×</button>
        <button data-speed="0.5">½×</button>
        <button data-speed="1" class="active">1×</button>
        <button data-speed="2">2×</button>
        <button data-speed="4">4×</button>
        <button data-speed="8">8×</button>
        <button data-speed="32">32×</button>
        <button data-speed="0" id="skip-pauses" title="play with no inter-frame delay">∞</button>
      </div>
    </div>

    <div class="row scrub-row">
      <input type="range" id="scrubber" min="0" max="0" step="1" value="0">
    </div>

    <div class="row btn-row">
      <button id="btn-home"  title="first frame (Home)">⏮ start</button>
      <button id="btn-t-100" title="−100 turns (Shift+←)">−100T</button>
      <button id="btn-t-10"  title="−10 turns (Ctrl+←)">−10T</button>
      <button id="btn-t-1"   title="−1 turn (←)">−1T</button>
      <button id="btn-f-1"   title="−1 frame ([)">−1f</button>
      <button id="btn-play"  class="primary" title="play/pause (Space)">▶ play</button>
      <button id="btn-f1"    title="+1 frame (])">+1f</button>
      <button id="btn-t1"    title="+1 turn (→)">+1T</button>
      <button id="btn-t10"   title="+10 turns (Ctrl+→)">+10T</button>
      <button id="btn-t100"  title="+100 turns (Shift+→)">+100T</button>
      <button id="btn-end"   title="last frame (End)">end ⏭</button>
    </div>

    <div class="row jump-row">
      <label>jump to turn:
        <input type="number" id="jump-turn" min="0" step="1" placeholder="e.g. 1500">
      </label>
      <button id="btn-jump">go</button>
      <span class="muted help">shortcuts: <kbd>Space</kbd> play  <kbd>←/→</kbd> ±1T  <kbd>Ctrl ←/→</kbd> ±10T  <kbd>Shift ←/→</kbd> ±100T  <kbd>[/]</kbd> ±1 frame  <kbd>Home/End</kbd></span>
    </div>
  </section>
</main>

<script src="/static/xterm.js"></script>
<script src="/static/xterm-fit.js"></script>
<script src="/static/replay.js"></script>
</body>
</html>
